global:
  scrape_interval: 5s

  external_labels:
    monitor: 'open5gs-monitor'

scrape_configs:
  - job_name: 'amf'
    static_configs:
      - targets: ['AMF_IP:9091']
  - job_name: 'smf'
    static_configs:
      - targets: ['SMF_IP:9091']
  - job_name: 'pcf'
    static_configs:
      - targets: ['PCF_IP:9091']
  - job_name: 'upf'
    static_configs:
      - targets: ['UPF_METRICS_IP:9091']
  - job_name: 'scaphandre-exigence1'
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ['SCAPHANDRE_HOST:SCAPHANDRE_PORT']
  - job_name: 'scaphandre-exigence2'
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ['EXIGENCE2_HOST:8080']
  - job_name: 'node-exigence2'
    static_configs:
      - targets: ['EXIGENCE2_HOST:9100']
  - job_name: 'powerapi-smartwatts'
    static_configs:
      - targets: ['POWERAPI_HOST:POWERAPI_PORT']
  - job_name: 'mme'
    static_configs:
      - targets: ['MME_IP:9091']
  - job_name: 'pcrf'
    static_configs:
      - targets: ['PCRF_IP:9091']
  - job_name: 'hss'
    static_configs:
      - targets: ['HSS_IP:9091']
